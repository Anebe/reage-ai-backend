spring.config:
  import: secrets.yml

spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true


efibank:
  client_id: ${efibank.dev.client_id}
  client_secret: ${efibank.dev.client_secret}
  certificate: ${efibank.dev.certificate}